<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimo Classico - Oficial</title>
    <link href="icone (4).png" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header>
        <img src="icone (4).png" alt="Logo do jogo" class="logo">
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#sobre">Quem Somos</a></li>
                <li><a href="#contato">Contato</a></li>
                <li><a href="index2.html" class="btn-destaque">JOGAR</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home">
            <h2>O DERBY CONTINUA!</h2>
            <p>A confusão começou no túnel e só você pode representar o bando de loucos.</p>
            <button onclick="window.location.href='index2.html'">IR PARA O JOGO</button>
        </section>

        <section id="sobre">
            <h2>Quem Somos</h2>
            <p></p>
        </section>

        <section id="contato">
            <h2>Contato</h2>
            <form>
                <input type="text" placeholder="Seu nome">
                <input type="email" placeholder="Seu e-mail">
                <textarea placeholder="Sua mensagem"></textarea>
                <button type="submit">ENVIAR MENSAGEM</button>
            </form>
        </section>

        <section id="download">
            <h2>JOGAR AGORA</h2>
            <p>Versão Alpha disponível. Clique no botão abaixo para jogar.</p>
            <button onclick="window.location.href='index2.html'" style="background: #28a745; color: white; margin-top: 10px;">JOGAR AGORA</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Desenvolvido por <strong>Pedro Nascimento</strong></p>
    </footer>

</body>
</html>
